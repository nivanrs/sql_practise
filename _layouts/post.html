---
layout: default
---

<article class="post">
    <header class="post-header">
        <h1 class="post-title">{{ page.title }}</h1>
        {% if page.date %}
        <p class="post-meta">{{ page.date }}</p>
        {% endif %}
        
        {% if page.pdf %}
        <div class="pdf-download-container">
            <a href="{{ page.pdf | relative_url }}" target="_blank" class="btn-primary">
                📄 View Carousel PDF
            </a>
        </div>
        {% endif %}
    </header>

    <div class="post-content">
        {{ content }}
    </div>
    
    <div class="post-footer">
        <a href="{{ '/' | relative_url }}" class="btn-secondary">&larr; Back to Index</a>
    </div>
</article>
